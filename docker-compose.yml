services:
  postgres:
    image: postgres:16-alpine
    container_name: flashsale-postgres
    environment:
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
      POSTGRES_DB: flashsale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    # appendonly = AOF, so the stock counter survives a restart
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
